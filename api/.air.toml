root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/server"
  cmd = "go build -o ./tmp/server ."
  delay = 500
  exclude_dir = ["tmp"]
  exclude_regex = ["_test.go"]
  include_ext = ["go", "mod", "sum"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
