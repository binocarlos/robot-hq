services:
  api:
    build:
      context: ./api
      target: dev
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    volumes:
      - ./api:/app

  web:
    build: ./web
    ports:
      - "5173:5173"
    environment:
      - API_URL=http://api:8080
    volumes:
      - ./web/src:/app/src
      - ./web/index.html:/app/index.html
      - ./web/vite.config.ts:/app/vite.config.ts
    depends_on:
      - api
